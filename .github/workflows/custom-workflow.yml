name: Normal Workflow

on:
  issues:
    types: [opened, labeled, unlabeled]
  discussion:
    types: [labeled]

permissions:
  issues: write
  discussions: write
  contents: write

jobs:
  workflow-transition:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===============================
      # Discussion → Issue Conversion
      # ===============================
      - name: Process Discussion
        if: ${{ github.event_name == 'discussion' }}
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;

            if (!discussion) {
              core.info('No discussion found. Skipping.');
              return;
            }

            const body =
              "## Original Discussion\n" +
              discussion.html_url + "\n\n" +
              "---\n\n" +
              "## Content (Automatically Transcribed)\n" +
              (discussion.body || "_No content_") + "\n\n" +
              "---\n\n" +
              "## Related Wiki\n" +
              `https://github.com/${context.repo.owner}/${context.repo.repo}/wiki/Design-Notes\n\n` +
              "---\n\n" +
              "**Status:** Open (Created from approved discussion)\n" +
              "**Next Step:** Move to project board (Backlog → Todo → Doing → Done)";

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: discussion.title,
                body: body,
                labels: ['from-discussion']
              });

              core.info(`Issue created successfully: #${issue.data.number}`);

            } catch (error) {
              core.setFailed(`Failed to create issue: ${error.message}`);
            }

      # ===============================
      # Issue State Logging (Safe)
      # ===============================
      - name: Process Issue State
        if: ${{ github.event_name == 'issues' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            if (!issue) {
              core.info('No issue found. Skipping.');
              return;
            }

            const labels = issue.labels.map(l => l.name);
            core.info(`Issue #${issue.number} labels: ${labels.join(', ')}`);

      # ===============================
      # Project Board Placeholder
      # ===============================
      - name: Update Project Board
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Project board update placeholder executed.');
