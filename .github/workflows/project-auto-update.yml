name: Projects Auto Update & Progress Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  repository-projects: write
  discussions: read

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-update projects
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const oneWeek = 7 * 24 * 60 * 60 * 1000;
            const oneMonth = 30 * 24 * 60 * 60 * 1000;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const projectNumber = 5;
            const columns = await github.rest.projects.listColumns({
              project_id: projectNumber
            });

            const columnMap = {};
            for (const col of columns.data) {
              columnMap[col.name] = col.id;
            }

            for (const issue of issues.data) {
              const labels = issue.labels.map(l => typeof l === 'string' ? l : l.name);
              const updated = new Date(issue.updated_at);
              const diff = now - updated;

              const projectItems = await github.rest.projects.listProjectItems({
                project_id: projectNumber
              });
              const item = projectItems.data.find(i => i.content_url && i.content_url.endsWith(`/issues/${issue.number}`));

              if (!item) {
                await github.rest.projects.createProjectCard({
                  column_id: columnMap['Approved'],
                  content_id: issue.node_id,
                  content_type: 'Issue'
                });
                console.log(`Issue #${issue.number} added to Approved`);
                continue;
              }

              if (labels.includes('in-progress') && item.column_id !== columnMap['In Progress']) {
                await github.rest.projects.moveProjectCard({
                  card_id: item.id,
                  position: 'top',
                  column_id: columnMap['In Progress']
                });
                console.log(`Issue #${issue.number} moved to In Progress`);
              } else if (labels.includes('done') && item.column_id !== columnMap['Done']) {
                await github.rest.projects.moveProjectCard({
                  card_id: item.id,
                  position: 'top',
                  column_id: columnMap['Done']
                });
                console.log(`Issue #${issue.number} moved to Done`);
              }

              if (diff >= oneMonth) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                console.log(`Closed issue #${issue.number} due to 1 month inactivity`);
              } else if (diff >= oneWeek) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '⚠️ This issue has not been updated for more than 1 week. Please check progress.'
                });
                console.log(`Alerted issue #${issue.number} due to 1 week inactivity`);
              }
            }
