name: Projects v2 Auto Update & Progress Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  repository-projects: write

jobs:
  update-projects:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-update Projects v2
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const oneWeek = 7 * 24 * 60 * 60 * 1000;
            const oneMonth = 30 * 24 * 60 * 60 * 1000;

            const partialProjectName = "Task Board";

            // リポジトリ内の Project v2 を取得
            const projects = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner:$owner, name:$repo) {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              updatedAt
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo });

            console.log("Available Project v2 titles:");
            for(const p of projects.repository.projectsV2.nodes) {
              console.log(`- "${p.title}"`);
            }

            const project = projects.repository.projectsV2.nodes.find(
              p => p.title.toLowerCase().includes(partialProjectName.toLowerCase())
            );

            if(!project) throw new Error(`No Project v2 found containing "${partialProjectName}"`);

            console.log(`Using Project v2: "${project.title}"`);

            const PROJECT_ID = project.id;
            const field = project.fields.nodes.find(f => f.name === "Status");
            if(!field) throw new Error('Status field not found in Project v2');

            const statusOptions = {};
            for(const opt of field.options) statusOptions[opt.name] = opt.id;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const itemMap = {};
            for(const item of project.items.nodes) if(item.content) itemMap[item.content.number] = item.id;

            for(const issue of issues.data){
              const updated = new Date(issue.updated_at);
              const diff = now - updated;

              let itemId = itemMap[issue.number];
              if(!itemId){
                const addResp = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                      item { id }
                    }
                  }
                `, { projectId: PROJECT_ID, contentId: issue.node_id });
                console.log(`Issue #${issue.number} added to Project v2`);
                itemId = addResp.addProjectV2ItemById.item.id;
              }

              const labels = issue.labels.map(l => typeof l === 'string' ? l : l.name);
              let statusValue = "Approved";
              if(labels.includes("in-progress")) statusValue = "In Progress";
              else if(labels.includes("done")) statusValue = "Done";

              await github.graphql(`
                mutation($itemId: ID!, $fieldId: ID!, $optionId: ID!) {
                  updateProjectV2ItemFieldValue(input: {
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, { itemId, fieldId: field.id, optionId: statusOptions[statusValue] });
              console.log(`Issue #${issue.number} set Status -> ${statusValue}`);

              if(diff >= oneWeek && diff < oneMonth){
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '⚠️ This issue has not been updated for more than 1 week. Please check progress.'
                });
                console.log(`Alerted issue #${issue.number} due to 1 week inactivity`);
              }

              if(diff >= oneMonth){
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                console.log(`Closed issue #${issue.number} due to 1 month inactivity`);
              }
            }
