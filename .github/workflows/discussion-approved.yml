name: Create issue from approved discussion

on:
  discussion:
    types: [labeled]

permissions:
  discussions: write
  issues: write
  contents: read

jobs:
  create-issue:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Create issue from discussion
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;

            const body =
              "## Original Discussion\n" +
              discussion.html_url + "\n\n" +
              "---\n\n" +
              "## Content (Automatically Transcribed)\n" +
              discussion.body + "\n\n" +
              "---\n\n" +
              "## Related Wiki\n" +
              `https://github.com/${context.repo.owner}/${context.repo.repo}/wiki/Design-Notes`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: discussion.title,
              body: body
            });
