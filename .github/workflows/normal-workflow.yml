name: Normal Workflow

on:
  issues:
    types: [opened, labeled, unlabeled]
  discussion:
    types: [labeled]

permissions:
  issues: write
  discussions: write
  contents: write

jobs:
  workflow-transition:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process State Transition
        uses: actions/github-script@v7
        with:
          script: |
            const item = context.payload.issue || context.payload.discussion;
            if (!item) {
              core.setFailed('No issue or discussion found');
              return;
            }
            const states = [
              { id: 'A', name: 'Idea', label: 'idea' },
              { id: 'D', name: 'Open TaskIssue', label: 'open' },
              { id: 'G', name: 'Add to Project Board', label: 'add-to-project' },
              { id: 'H', name: 'Backlog', label: 'backlog' },
              { id: 'I', name: 'Todo', label: 'todo' },
              { id: 'J', name: 'Doing', label: 'doing' },
              { id: 'K', name: 'Done', label: 'done' },
              { id: 'E', name: 'Close Discussion', label: 'closed' }
            ];
            const currentLabels = (item.labels || []).map(l => (l && l.name) ? l.name.toLowerCase() : '');
            function determineCurrentState(labels) {
              const found = states.find(s => labels.includes(s.label));
              return found ? found.name : 'Idea';
            }
            function getNextState(stateName) {
              const order = ['Idea','Open TaskIssue','Add to Project Board','Backlog','Todo','Doing','Done','Close Discussion'];
              const index = order.indexOf(stateName);
              if (index === -1 || index === order.length - 1) return null;
              return order[index + 1];
            }
            async function transitionToState(itemObj, nextStateName) {
              const next = states.find(s => s.name === nextStateName);
              if (!next) return;
              try {
                if (context.payload.issue) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: itemObj.number,
                    labels: [next.label]
                  });
                } else if (context.payload.discussion) {
                  await github.request('POST /repos/{owner}/{repo}/discussions/{discussion_number}/labels', {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    discussion_number: itemObj.number,
                    labels: [next.label]
                  });
                }
                core.info(`Transitioned item #${itemObj.number} to state ${nextStateName}`);
              } catch (err) {
                core.error(`Failed to transition item #${itemObj.number} to ${nextStateName}: ${err}`);
              }
            }
            const currentState = determineCurrentState(currentLabels);
            core.info(`Current state: ${currentState}`);
            const autoMode = true;
            const nextState = getNextState(currentState);
            if (nextState && autoMode) {
              await transitionToState(item, nextState);
            }

      - name: Update Project Board
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Project board update step executed')
