name: Add Issue to Project

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            if (!issue) {
              core.setFailed('Issue is missing or invalid');
              return;
            }
            
            core.info(`Processing issue: #${issue.number} - ${issue.title}`);

      - name: Check if Already in Project
        id: check-project
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            
            const alreadyProcessed = labels.includes('from-discussion');
            
            core.setOutput('skip_add', alreadyProcessed);
            
            if (alreadyProcessed) {
              core.info('Issue was created from discussion, already added to project');
            }

      - name: Add to Project Board
        if: steps.check-project.outputs.skip_add != 'true'
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/Uchida16104/projects/5
          github-token: ${{ secrets.GH_PAT }}

      - name: Add Confirmation Comment
        if: steps.check-project.outputs.skip_add != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `📋 This issue has been automatically added to the project board.

**Current Status:** Backlog

**Workflow:**
\`\`\`mermaid
graph LR
  A[Backlog] --> B[Todo]
  B --> C[Doing]
  C --> D[Done]
  style A fill:#f9f,stroke:#333,stroke-width:2px
\`\`\`

Please move this task through the workflow as progress is made.`
            });

      - name: Set Initial Status Label
        if: steps.check-project.outputs.skip_add != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['status:backlog']
            });
