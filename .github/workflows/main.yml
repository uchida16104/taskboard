name: Add issue to project

on:
  issues:
    types: [opened]

jobs:
  add:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            if (!issue) {
              core.setFailed('Issue is missing or invalid');
              return;
            }
            
            core.info(`Processing issue: #${issue.number} - ${issue.title}`);

      - name: Add to project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/Uchida16104/projects/5
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm project addition
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '📋 This issue has been automatically added to the project board.\n\n**Current Status:** Backlog\n\n**Workflow:**\n```mermaid\ngraph LR\n  A[Backlog] --> B[Todo]\n  B --> C[Doing]\n  C --> D[Done]\n  style A fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nPlease move this task through the workflow as progress is made.'
              });
            } catch (error) {
              core.warning(`Could not add comment to issue: ${error.message}`);
            }

      - name: Set initial status label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status:backlog']
              });
            } catch (error) {
              core.warning(`Could not add status label: ${error.message}`);
            }
