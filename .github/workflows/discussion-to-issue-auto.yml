name: Discussion to Issue (Auto)

on:
  discussion:
    types: [created, labeled]

permissions:
  discussions: write
  issues: write
  contents: write

jobs:
  auto-process:
    runs-on: ubuntu-latest

    steps:
      - name: Check Auto Mode
        id: check-auto
        run: |
          echo "auto_enabled=true" >> $GITHUB_OUTPUT

      - name: Auto Apply Approved Label
        if: steps.check-auto.outputs.auto_enabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;
            
            if (!discussion) return;
            
            const hasApprovedLabel = (discussion.labels || []).some(l => 
              (typeof l === 'string' ? l : l.name) === 'approved'
            );
            
            if (!hasApprovedLabel && discussion.category && discussion.category.slug === 'ideas') {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: discussion.number,
                labels: ['approved']
              });
              
              core.info('Auto-applied approved label');
            }

      - name: Create Issue from Approved Discussion
        if: github.event.label && github.event.label.name == 'approved'
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: discussion.title,
              body: `## Original Discussion\n${discussion.html_url}\n\n---\n\n${discussion.body}\n\n---\n\n**Status:** Open\n**Auto-created:** Yes`,
              labels: ['from-discussion', 'status:open']
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              body: `✅ Auto-approved! Issue #${issue.data.number} created automatically.`
            });

      - name: Add to Project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/Uchida16104/projects/5
          github-token: ${{ secrets.GH_PAT }}
