name: Close rejected discussion

on:
  discussion:
    types: [labeled]

jobs:
  close-discussion:
    if: github.event.label.name == 'rejected'
    runs-on: ubuntu-latest
    steps:
      - name: Close discussion
        uses: actions/github-script@v7
        with:
          script: |
            const discussionId = context.payload.discussion.node_id;

            await github.graphql(`
              mutation CloseDiscussion($id: ID!) {
                closeDiscussion(input: { discussionId: $id }) {
                  discussion {
                    id
                    isClosed
                  }
                }
              }
            `, {
              id: discussionId
            });
