name: Fetch GitHub Projects

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Projects v2
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p docs/data
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { user(login: \"Uchida16104\") { projectV2(number: 5) { title items(first: 100) { nodes { content { ... on Issue { title state url } } fieldValues(first: 20) { nodes { ... on ProjectV2ItemFieldSingleSelectValue { name field { name } } ... on ProjectV2ItemFieldDateValue { date field { name } } } } } } } }"}' \
            > docs/data/projects.json


      - name: Commit JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin
          git pull --rebase origin main
          git add docs/data/projects.json
          git commit -m "Update projects data" || echo "No changes"
          git push origin main
