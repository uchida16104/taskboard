name: Fetch GitHub Projects

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Sync with remote
      # -----------------------------
      - name: Sync with remote
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase origin main

      # -----------------------------
      # Fetch GitHub Projects v2
      # -----------------------------
      - name: Fetch Projects v2
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p docs/data

          cat <<'EOF' > payload.json
          {
            "query": "query { user(login: \"Uchida16104\") { projectV2(number: 5) { title items(first: 100) { nodes { id content { __typename ... on Issue { title state url } } fieldValues(first: 20) { nodes { ... on ProjectV2ItemFieldSingleSelectValue { name field { name } } ... on ProjectV2ItemFieldDateValue { date field { name } } } } } } } }"
          }
          EOF

          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @payload.json \
            > docs/data/projects.json

      # -----------------------------
      # Commit & Push
      # -----------------------------
      - name: Commit JSON
        run: |
          git add docs/data/projects.json
          git commit -m "Update projects data" || echo "No changes"
          git push origin main
