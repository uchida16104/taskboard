name: Fetch GitHub Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase origin main

      - name: Fetch Projects v2
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p docs/data

          cat > payload.json <<'EOF'
          {
            "query": "query { user(login: \"Uchida16104\") { projectV2(number: 5) { title items(first: 100) { nodes { id content { __typename ... on Issue { title state url } } } } } } }"
          }
          EOF

          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @payload.json \
            > docs/data/projects.json

      - name: Commit JSON
        run: |
          git add docs/data/projects.json
          git commit -m "Update projects data" || echo "No changes"
          git push origin main
