name: Unified TaskBoard Workflow

on:
  discussions:
    types: [labeled]
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  discussions: write
  issues: write
  contents: write

jobs:
  process-discussion-or-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Item Type and Label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const isDiscussion = Boolean(context.payload.discussion);
            const isIssue = Boolean(context.payload.issue);
            const label = context.payload.label?.name || '';
            const item = context.payload.discussion || context.payload.issue;

            core.setOutput('is_discussion', String(isDiscussion));
            core.setOutput('is_issue', String(isIssue));
            core.setOutput('label', label);
            core.setOutput('item_number', item?.number ?? 0);

            core.info(`Type: ${isDiscussion ? 'Discussion' : 'Issue'}, Label: ${label}`);

      - name: Process APPROVED Label
        if: steps.check.outputs.label == 'approved' && steps.check.outputs.is_discussion == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'from-discussion',
              per_page: 100
            });

            const alreadyCreated = existingIssues.data.find(issue =>
              issue.body && issue.body.includes(discussion.html_url)
            );

            if (alreadyCreated) {
              core.info(`Issue already exists: #${alreadyCreated.number}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: discussion.number,
                body: `This discussion was already converted to issue #${alreadyCreated.number}`
              });

              return;
            }

            const issueBody = `
## Original Discussion
${discussion.html_url}

----

## Content (Automatically Transcribed)
${discussion.body || '_No content provided_'}

----

## Related Wiki
https://github.com/${context.repo.owner}/${context.repo.repo}/wiki/Design-Notes

----

**Status:** Open (Created from approved discussion)  
**Next Step:** Backlog → Todo → Doing → Done
`.trim();

            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: discussion.title,
              body: issueBody,
              labels: ['from-discussion', 'status:open']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              body: `Approved and converted to issue #${newIssue.data.number}`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              labels: ['converted-to-issue']
            });

      - name: Process REJECTED Label
        if: steps.check.outputs.label == 'rejected' && steps.check.outputs.is_discussion == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              body: `This discussion has been rejected and will be closed.`
            });

            await github.graphql(
              `mutation ($id: ID!) {
                closeDiscussion(input: { discussionId: $id }) {
                  discussion { id closed }
                }
              }`,
              { id: discussion.node_id }
            );

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              labels: ['rejected-closed']
            });

      - name: Process NEEDS-REVIEW Label
        if: steps.check.outputs.label == 'needs-review' && steps.check.outputs.is_discussion == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const discussion = context.payload.discussion;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              body: `This discussion is pending review.`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussion.number,
              labels: ['pending-review']
            });

      - name: Add Issue to Project Board
        if: steps.check.outputs.label == 'approved' && steps.check.outputs.is_discussion == 'true'
        uses: actions/add-to-project@v0.5.0
        continue-on-error: true
        with:
          project-url: https://github.com/users/Uchida16104/projects/5
          github-token: ${{ secrets.GH_PAT }}

      - name: Workflow Summary
        uses: actions/github-script@v7
        with:
          script: |
            const label = '${{ steps.check.outputs.label }}';
            const itemNum = '${{ steps.check.outputs.item_number }}';
            const isDiscussion = '${{ steps.check.outputs.is_discussion }}' === 'true';

            let summary = `# Workflow Execution Summary

- Item Type: ${isDiscussion ? 'Discussion' : 'Issue'}
- Item Number: #${itemNum}
- Label Applied: ${label}
`;

            core.summary.addRaw(summary).write();
