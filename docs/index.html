<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskBoard Status</title>

<!-- TailwindCSS @latest -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- HTMX @latest -->
<script src="https://unpkg.com/htmx.org@latest"></script>

<!-- Alpine.js @latest -->
<script src="https://unpkg.com/alpinejs@latest" defer></script>

<!-- hyperscript @latest -->
<script src="https://unpkg.com/hyperscript.org@latest"></script>

<!-- AOS @latest -->
<link href="https://unpkg.com/aos@latest/dist/aos.css" rel="stylesheet"/>
<script src="https://unpkg.com/aos@latest/dist/aos.js"></script>

<!-- Swiper @latest -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@latest/swiper-bundle.min.css">
<script src="https://cdn.jsdelivr.net/npm/swiper@latest/swiper-bundle.min.js"></script>

<!-- mermaid @latest -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.min.js"></script>

<!-- lottie-web @latest -->
<script src="https://cdn.jsdelivr.net/npm/lottie-web@latest/build/player/lottie.min.js"></script>

<!-- shoelace @latest -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/themes/light.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/shoelace.esm.js"></script>

<!-- iconify -->
<script src="https://code.iconify.design/3/3.2.1/iconify.min.js"></script>

<!-- Motion One @latest -->
<script src="https://cdn.jsdelivr.net/npm/motion@latest/dist/motion.dev.js"></script>

<style>
  html { scroll-behavior: smooth; }
</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div x-data="app()" x-init="init()" class="container mx-auto p-4">

  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-3xl font-bold">TaskBoard Status</h1>

    <!-- View Switch -->
    <div class="space-x-2">
      <a href="../" hx-push-url="true" style="color: black; text-decoration: none;">Home</a>
      <a href="../wiki/index.html" hx-push-url="true" style="color: black; text-decoration: none;">AI Prompts</a>
    </div>
  </div>

  <!-- Mermaid Dependencies -->
  <div id="dependencies" class="my-6"></div>

  <!-- Calendar -->
  <div id="calendar"></div>

  <!-- Progress -->
  <div class="my-6 p-4 bg-white shadow rounded">
    <h2 class="text-xl font-semibold">Progress Rates</h2>
    <div id="progress"></div>
  </div>
</div>

<script>
function app(){
  return {

    view: 'month', data: [], issues: [], wiki: [], discussions: [], dependencies: '',

    init(){

      AOS.init();

      // 1) JSON Fetch
      fetch("https://raw.githubusercontent.com/Uchida16104/TaskBoard/refs/heads/main/docs/data/projects.json")
      .then(r => r.json())
      .then(json => {
        this.issues = json.data.user.projectV2.items.nodes.map(i=>{
          return {
            title: i.content.title,
            state: i.content.state,
            url: i.content.url
          }
        });
      })
      .then(_ => this.renderCalendar());

      // 2) Discussions Fetch
      fetch("https://api.github.com/repos/Uchida16104/TaskBoard/discussions")
      .then(r=>r.json())
      .then(d=>this.discussions=d);

      // 3) Wiki Pages Fetch
      fetch("https://api.github.com/repos/Uchida16104/TaskBoard/wiki/pages")
      .then(r=>r.json())
      .then(w=>this.wiki=w);

    },

    renderCalendar(){

      // progress
      let closed = this.issues.filter(i=>i.state==="CLOSED").length;
      let total = this.issues.length;
      document.querySelector("#progress").innerHTML =
        `<div class="text-lg font-bold">${closed}/${total} closed (${Math.round(closed/total*100)}%)</div>`;

      // Basic calendar HTML for month
      document.querySelector("#calendar").innerHTML =
        `<div class="grid grid-cols-7 gap-1">
          ${this.issues.map(i =>
            `<div class="p-2 bg-white rounded shadow" data-aos="fade-up">
               <a href="${i.url}" class="font-semibold">${i.title}</a>
               <div class="${i.state==='OPEN'?'text-red-600':'text-green-600'}">${i.state}</div>
             </div>`).join("")}
        </div>`;
    }
  }
}
</script>

</body>
</html>
