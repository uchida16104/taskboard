<!doctype html>
<html lang="ja" class="h-full">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TaskBoard Calendar</title>

<!-- TailwindCSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine.js -->
<script src="https://unpkg.com/alpinejs@latest/dist/cdn.min.js" defer></script>

<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@latest"></script>

<!-- hyperscript -->
<script src="https://unpkg.com/hyperscript.org@latest"></script>

<!-- AOS -->
<link href="https://unpkg.com/aos@latest/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@latest/dist/aos.js"></script>

<!-- Swiper -->
<link rel="stylesheet" href="https://unpkg.com/swiper@latest/swiper-bundle.min.css">
<script src="https://unpkg.com/swiper@latest/swiper-bundle.min.js"></script>

<!-- Mermaid -->
<script src="https://unpkg.com/mermaid@latest/dist/mermaid.min.js"></script>

<!-- Lottie -->
<script src="https://unpkg.com/lottie-web@latest/build/player/lottie.min.js"></script>

<!-- Shoelace -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/themes/light.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/shoelace.js"></script>

<!-- Iconify -->
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

<!-- Motion One -->
<script src="https://unpkg.com/@motionone/dom@latest/dist/motion-one.min.js"></script>

<style>
  [x-cloak]{display:none}
</style>
</head>

<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100"
      x-data="taskBoard()" x-init="init()">

<header class="p-4 flex justify-between items-center border-b">
  <h1 class="text-xl font-bold">TaskBoard Calendar</h1>

  <sl-switch @sl-change="toggleDark()" checked>
    Dark Mode
  </sl-switch>
</header>

<section class="p-4 space-x-2">
  <button class="px-3 py-1 bg-blue-600 text-white rounded"
          hx-get="?view=month" hx-push-url="true"
          @click="view='month'">Month</button>
  <button class="px-3 py-1 bg-green-600 text-white rounded"
          hx-get="?view=week" hx-push-url="true"
          @click="view='week'">Week</button>
  <button class="px-3 py-1 bg-purple-600 text-white rounded"
          hx-get="?view=day" hx-push-url="true"
          @click="view='day'">Day</button>
</section>

<!-- Progress -->
<section class="p-4 flex items-center gap-4">
  <div id="progressAnim" class="w-24 h-24"></div>
  <div>
    <p class="text-lg font-semibold">Progress</p>
    <p x-text="progressText"></p>
  </div>
</section>

<!-- Calendar -->
<section class="p-4">
  <template x-if="view==='month'">
    <div class="grid grid-cols-7 gap-2">
      <template x-for="day in calendar">
        <div class="border p-2 min-h-[120px]" data-aos="fade-up">
          <p class="font-bold" x-text="day.date"></p>
          <template x-for="issue in day.issues">
            <a :href="issue.url" target="_blank"
               class="block text-sm rounded px-1 mt-1"
               :class="issue.state==='CLOSED' ? 'bg-green-300' : 'bg-red-300'"
               x-text="issue.title"></a>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- Week View -->
  <template x-if="view==='week'">
    <div class="swiper">
      <div class="swiper-wrapper">
        <template x-for="day in calendar">
          <div class="swiper-slide p-4 border">
            <h3 class="font-bold" x-text="day.date"></h3>
            <template x-for="issue in day.issues">
              <a :href="issue.url" target="_blank"
                 class="block mt-1"
                 x-text="issue.title"></a>
            </template>
          </div>
        </template>
      </div>
    </div>
  </template>
</section>

<!-- Tabs -->
<section class="p-4">
  <sl-tab-group>
    <sl-tab slot="nav" panel="issues">Issues</sl-tab>
    <sl-tab slot="nav" panel="discussions">Discussions</sl-tab>
    <sl-tab slot="nav" panel="wiki">Wiki</sl-tab>

    <sl-tab-panel name="issues">
      <pre x-text="JSON.stringify(issues,null,2)"></pre>
    </sl-tab-panel>

    <sl-tab-panel name="discussions">
      <p>GitHub Discussions integrated</p>
    </sl-tab-panel>

    <sl-tab-panel name="wiki">
      <p>GitHub Wiki integrated</p>
    </sl-tab-panel>
  </sl-tab-group>
</section>

<!-- Mermaid -->
<section class="p-4">
  <div class="mermaid">
graph TD
  Issue --> Discussion
  Discussion --> Wiki
  </div>
</section>

<script>
function taskBoard(){
  return {
    view:'month',
    issues:[],
    calendar:[],
    progressText:'',

    async init(){
      AOS.init();
      mermaid.initialize({startOnLoad:true});

      const res = await fetch(
        'https://raw.githubusercontent.com/Uchida16104/TaskBoard/refs/heads/main/docs/data/projects.json'
      );
      const json = await res.json();
      this.issues = json.data.user.projectV2.items.nodes.map(n=>{
        return {
          title:n.content.title,
          state:n.content.state,
          url:n.content.url,
          start:new Date(),
          end:new Date()
        }
      });

      this.buildCalendar();
      this.calcProgress();
      this.initLottie();
      this.$nextTick(()=>this.initSwiper());
    },

    buildCalendar(){
      const today=new Date();
      this.calendar=[];
      for(let i=1;i<=30;i++){
        this.calendar.push({
          date:`${today.getMonth()+1}/${i}`,
          issues:this.issues
        });
      }
      motion.animate('.border',{opacity:[0,1],y:[20,0]});
    },

    calcProgress(){
      const closed=this.issues.filter(i=>i.state==='CLOSED').length;
      this.progressText=`${closed} / ${this.issues.length}`;
    },

    initSwiper(){
      if(this.view==='week'){
        new Swiper('.swiper',{slidesPerView:7});
      }
    },

    initLottie(){
      lottie.loadAnimation({
        container:document.getElementById('progressAnim'),
        renderer:'svg',
        loop:true,
        autoplay:true,
        path:'https://assets9.lottiefiles.com/packages/lf20_jcikwtux.json'
      });
    },

    toggleDark(){
      document.documentElement.classList.toggle('dark');
    }
  }
}
</script>

</body>
</html>
