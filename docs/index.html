<!doctype html>
<html lang="ja" x-data="taskBoard()" x-init="init()" :class="dark ? 'sl-theme-dark' : ''">
<head>
<meta charset="utf-8">
<title>TaskBoard Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine -->
<script src="https://unpkg.com/alpinejs@latest/dist/cdn.min.js" defer></script>

<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@latest"></script>

<!-- hyperscript -->
<script src="https://unpkg.com/hyperscript.org@latest"></script>

<!-- Shoelace -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/themes/light.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/shoelace.js"></script>

<!-- Swiper -->
<link rel="stylesheet" href="https://unpkg.com/swiper@latest/swiper-bundle.min.css">
<script src="https://unpkg.com/swiper@latest/swiper-bundle.min.js"></script>

<!-- Motion One -->
<script src="https://unpkg.com/motion@latest/dist/motion.min.js"></script>

<!-- Mermaid -->
<script src="https://unpkg.com/mermaid@latest/dist/mermaid.min.js"></script>

<!-- Lottie -->
<script src="https://unpkg.com/lottie-web@latest/build/player/lottie.min.js"></script>

<!-- Iconify -->
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>

<style>
.issue-open { background:#2563eb }
.issue-closed { background:#16a34a }
</style>
</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-white">

<header class="flex justify-between p-4">
<h1 class="text-xl font-bold">TaskBoard Calendar</h1>
<sl-switch x-model="dark">Dark</sl-switch>
</header>

<nav class="flex gap-2 p-2">
<button @click="setView('month')" hx-push-url="true" hx-get="?view=month">Month</button>
<button @click="setView('week')" hx-push-url="true" hx-get="?view=week">Week</button>
<button @click="setView('day')" hx-push-url="true" hx-get="?view=day">Day</button>
</nav>

<section class="p-4">
<div id="progress" class="w-full h-32"></div>
</section>

<section x-show="view==='week'" class="swiper">
<div class="swiper-wrapper">
<template x-for="d in weekDays">
<div class="swiper-slide p-2">
<h3 x-text="d"></h3>
<div x-html="renderIssues(d)"></div>
</div>
</template>
</div>
</section>

<section class="p-4">
<svg id="calendar" width="100%" height="400"></svg>
</section>

<section class="p-4">
<sl-tab-group>
<sl-tab slot="nav" panel="wiki">Wiki</sl-tab>
<sl-tab slot="nav" panel="discussion">Discussion</sl-tab>

<sl-tab-panel name="wiki">
<div class="mermaid" x-text="wikiGraph"></div>
</sl-tab-panel>

<sl-tab-panel name="discussion">
<div class="mermaid" x-text="discussionGraph"></div>
</sl-tab-panel>
</sl-tab-group>
</section>

<script>
function taskBoard(){
return {
dark:false,
view:'month',
items:[],
weekDays:[],
wikiGraph:'',
discussionGraph:'',

async init(){
await this.load()
this.calcProgress()
this.renderCalendar()
this.initLottie()
mermaid.initialize({ startOnLoad:true })
},

async load(){
try{
const res = await fetch(
'https://raw.githubusercontent.com/Uchida16104/TaskBoard/refs/heads/main/docs/data/projects.json'
)
const json = await res.json()
this.items = json.data.user.projectV2.items.nodes.map(n=>{
const body = n.content.body || ''
const s = body.match(/start:\s*(\d{4}-\d{2}-\d{2})/)
const e = body.match(/end:\s*(\d{4}-\d{2}-\d{2})/)
return {
...n.content,
start: s ? s[1] : new Date().toISOString().slice(0,10),
end:   e ? e[1] : new Date().toISOString().slice(0,10)
}
})
}catch(e){console.error(e)}
},

calcProgress(){
const all=this.items.length
const closed=this.items.filter(i=>i.state==='CLOSED').length
this.progress=Math.round((closed/all)*100)
},

initLottie(){
lottie.loadAnimation({
container:document.getElementById('progress'),
renderer:'svg',
loop:true,
autoplay:true,
path:'https://assets10.lottiefiles.com/packages/lf20_jcikwtux.json'
})
},

renderCalendar(){
const svg=document.getElementById('calendar')
svg.innerHTML=''
this.items.forEach((i,idx)=>{
const r=document.createElementNS('http://www.w3.org/2000/svg','rect')
r.setAttribute('x',20)
r.setAttribute('y',idx*30+20)
r.setAttribute('width',300)
r.setAttribute('height',20)
r.setAttribute('class', i.state==='CLOSED'?'issue-closed':'issue-open')
svg.appendChild(r)
motion.animate(r,{opacity:[0,1],x:[-50,0]},{duration:0.6})
})
}
}}
</script>

</body>
</html>
