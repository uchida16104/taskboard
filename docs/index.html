<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>TaskBoard Calendar</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine -->
<script defer src="https://unpkg.com/alpinejs@latest/dist/cdn.min.js"></script>

<!-- AOS -->
<link href="https://unpkg.com/aos@latest/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@latest/dist/aos.js"></script>

</head>
<body class="bg-gray-100 p-6" x-data="taskBoard()" x-init="init()">

<h1 class="text-3xl font-bold mb-4">TaskBoard Progress</h1>

<!-- Progress -->
<div class="mb-6">
  <div class="text-sm mb-1">Progress: <span x-text="progress"></span>%</div>
  <div class="w-full bg-gray-300 rounded h-4">
    <div class="bg-green-500 h-4 rounded" :style="`width:${progress}%`"></div>
  </div>
</div>

<!-- Tasks -->
<div class="grid md:grid-cols-3 gap-4">
  <template x-for="task in tasks">
    <div class="bg-white p-4 rounded shadow" data-aos="fade-up">
      <h2 class="font-bold" x-text="task.title"></h2>
      <p class="text-sm text-gray-500" x-text="task.status"></p>
      <a class="text-blue-600 text-sm" :href="task.url" target="_blank">GitHub</a>
    </div>
  </template>
</div>

<script>
function taskBoard() {
  return {
    tasks: [],
    progress: 0,

    async init() {
      AOS.init();
      const res = await fetch('./data/projects.json');
      const json = await res.json();

      const items = json.data.user.projectV2.items.nodes;
      let done = 0;

      this.tasks = items.map(i => {
        const statusField = i.fieldValues.nodes.find(f => f.field?.name === "Status");
        if (statusField?.name === "Done") done++;

        return {
          title: i.content?.title ?? "No title",
          status: statusField?.name ?? "Unknown",
          url: i.content?.url ?? "#"
        };
      });

      this.progress = Math.round((done / this.tasks.length) * 100);
    }
  }
}
</script>

</body>
</html>
