<!DOCTYPE html>
<html lang="ja" x-data="taskBoard()" x-init="init()" class="h-full">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TaskBoard Calendar</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Alpine -->
<script defer src="https://unpkg.com/alpinejs@latest/dist/cdn.min.js"></script>

<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@latest"></script>

<!-- hyperscript -->
<script src="https://unpkg.com/hyperscript.org@latest"></script>

<!-- Shoelace -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/themes/light.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@latest/dist/shoelace.js"></script>

<!-- Swiper -->
<link rel="stylesheet" href="https://unpkg.com/swiper@latest/swiper-bundle.min.css">
<script src="https://unpkg.com/swiper@latest/swiper-bundle.min.js"></script>

<!-- Mermaid -->
<script src="https://unpkg.com/mermaid@latest/dist/mermaid.min.js"></script>

<!-- Motion One -->
<script src="https://unpkg.com/@motionone/dom@latest/dist/motion-one.umd.js"></script>

<!-- Lottie -->
<script src="https://unpkg.com/lottie-web@latest/build/player/lottie.min.js"></script>

<!-- Iconify -->
<script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

<style>
[x-cloak]{display:none}
</style>
</head>

<body class="h-full bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100">

<header class="flex justify-between items-center p-4 border-b">
  <h1 class="text-xl font-bold">TaskBoard Calendar</h1>
  <sl-switch @sl-change="toggleTheme()">Dark</sl-switch>
</header>

<nav class="flex gap-2 p-4">
  <button class="px-3 py-1 bg-blue-600 text-white rounded"
    hx-get="?view=month" hx-push-url="true" @click="view='month'">Month</button>
  <button class="px-3 py-1 bg-blue-600 text-white rounded"
    hx-get="?view=week" hx-push-url="true" @click="view='week'">Week</button>
  <button class="px-3 py-1 bg-blue-600 text-white rounded"
    hx-get="?view=day" hx-push-url="true" @click="view='day'">Day</button>
</nav>

<section class="p-4">
  <div class="mb-4">
    <div id="progressAnim" class="w-40 h-40"></div>
    <p class="mt-2 text-lg font-semibold">
      Progress: <span x-text="progress + '%'"></span>
    </p>
  </div>

  <!-- Month View -->
  <div x-show="view==='month'" x-cloak class="grid grid-cols-7 gap-2">
    <template x-for="issue in issues" :key="issue.id">
      <div class="p-2 rounded shadow bg-white dark:bg-slate-800"
        :class="issue.state==='CLOSED'?'border-l-4 border-green-500':'border-l-4 border-red-500'"
        x-init="animateIssue($el)">
        <a :href="issue.url" target="_blank" class="font-semibold" x-text="issue.title"></a>
        <p class="text-sm" x-text="issue.state"></p>
      </div>
    </template>
  </div>

  <!-- Week View -->
  <div x-show="view==='week'" x-cloak class="swiper">
    <div class="swiper-wrapper">
      <template x-for="issue in issues">
        <div class="swiper-slide p-4">
          <div class="bg-white dark:bg-slate-800 p-4 rounded shadow">
            <a :href="issue.url" target="_blank" x-text="issue.title"></a>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Day View -->
  <div x-show="view==='day'" x-cloak>
    <template x-for="issue in issues">
      <div class="mb-2 p-2 bg-white dark:bg-slate-800 rounded shadow">
        <a :href="issue.url" target="_blank" x-text="issue.title"></a>
      </div>
    </template>
  </div>
</section>

<section class="p-4">
  <div class="flex gap-4">
    <button @click="tab='wiki'">Wiki</button>
    <button @click="tab='discussion'">Discussion</button>
    <button @click="tab='graph'">Graph</button>
  </div>

  <div x-show="tab==='graph'" x-cloak>
    <pre class="mermaid" x-text="mermaidGraph"></pre>
  </div>
</section>

<script>
function taskBoard(){
  return {
    issues:[],
    view:'month',
    tab:'graph',
    progress:0,
    mermaidGraph:'',
    async init(){
      try{
        const res = await fetch(
          'https://raw.githubusercontent.com/Uchida16104/TaskBoard/refs/heads/main/docs/data/projects.json'
        )
        const json = await res.json()
        this.issues = json.data.user.projectV2.items.nodes.map(n=>n.content)
        const closed = this.issues.filter(i=>i.state==='CLOSED').length
        this.progress = Math.round(closed / this.issues.length * 100)

        this.mermaidGraph = 'graph TD\n' + this.issues.map(i =>
          `${i.title.replace(/\s/g,'_')}["${i.title}"]`
        ).join('\n')

        mermaid.initialize({startOnLoad:true})
        this.$nextTick(()=>mermaid.run())

        lottie.loadAnimation({
          container:document.getElementById('progressAnim'),
          renderer:'svg',
          loop:true,
          autoplay:true,
          path:'https://assets10.lottiefiles.com/packages/lf20_jcikwtux.json'
        })

        new Swiper('.swiper')
      }catch(e){
        console.error(e)
      }
    },
    toggleTheme(){
      document.documentElement.classList.toggle('dark')
    },
    animateIssue(el){
      motion.animate(el,{opacity:[0,1],y:[20,0]},{duration:0.5})
    }
  }
}
</script>

</body>
</html>
